name: Deploy to Modal

on:
  push:
    branches: [main]
    paths:
      - "app.py"
      - "elo.py"
      - "storage.py"
      - "service.py"
      - "models/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install modal

      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          # Stop the running app to kill any warm/stale containers,
          # so the smoke test always hits freshly-built code.
          modal app stop arabic-tts-arena 2>/dev/null || true
          modal deploy app.py
